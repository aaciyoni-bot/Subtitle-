<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneScreen AI - פתקית ראיון טלפוני</title>
    
    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('root').innerHTML = "<div style='color:red; padding:30px; direction:ltr; text-align:left; font-family:sans-serif;'><h3>Oops! Something went wrong:</h3><p>" + msg + "</p><p>Line: " + line + "</p></div>";
        };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.1/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans font-normal text-right">
    
    <div id="root" class="flex flex-col items-center justify-center min-h-screen text-gray-500 font-bold text-xl text-center">
        <i class="fas fa-spinner fa-spin text-emerald-600 text-4xl mb-4"></i>
        <div>טוען את המערכת...</div>
        <div class="text-sm font-normal mt-2">אם המסך נשאר כך, לחץ על Ctrl + F5 כדי לרענן.</div>
    </div>

        function App() {

          const [candidateCompleted, setCandidateCompleted] = useState(false);
          const [showJobDetails, setShowJobDetails] = useState(false);

          const navigate = (screen) => {
              window.scrollTo(0, 0);
              setCurrentScreen(screen);
          };

          // --- מסך 1: דשבורד מגייס ---
          const renderDashboard = () => (

              <div className="flex justify-between items-center mb-8">
                <div>
                  <h1 className="text-3xl font-bold text-emerald-900 flex items-center gap-3">
                    <i className="fas fa-phone-alt text-emerald-700"></i>
                    PhoneScreen AI
                  </h1>
                  <p className="text-gray-600 mt-1">פתקית ראיון טלפוני חכמה</p>
                </div>
                <button 
                  onClick={() => navigate('createJob')}
                  className="bg-emerald-800 hover:bg-emerald-900 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors shadow-sm"

                {/* כרטיס משרה 1 - רכז/ת גיוס */}

                    <div className="flex justify-between items-start mb-4">
                      <div>

                        <p className="text-sm text-gray-500 mt-1">חברת שירותים • מטה החברה</p>
                      </div>
                      <span className="bg-emerald-100 text-emerald-800 text-xs px-2 py-1 rounded-full font-medium border border-emerald-200">
                        פעילה
                      </span>
                    </div>
                    
                    <div className="space-y-3 mb-6">
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-gray-600 flex items-center gap-2">
                          <i className="fas fa-users"></i> מועמדים חדשים:
                        </span>
                        <span className={`font-bold ${candidateCompleted ? 'text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded-md' : 'text-gray-800'}`}>

                        </span>
                      </div>
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-gray-600 flex items-center gap-2">
                          <i className="fas fa-file-alt"></i> פתקיות מוכנות:
                        </span>
                        <span className="font-bold text-gray-800">0</span>
                      </div>
                    </div>

                    <button 
                      onClick={() => navigate('jobCandidates')}
                      className="w-full border border-emerald-800 text-emerald-800 hover:bg-emerald-50 py-2 rounded-lg font-medium transition-colors"
                    >
                      כניסה למשרה
                    </button>
                  </div>
                </div>

                {/* כרטיס משרה 2 - מנהל אזור אבטחה */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
                  <div className="h-2 bg-emerald-800 w-full"></div>
                  <div className="p-5">
                    <div className="flex justify-between items-start mb-4">
                      <div>
                        <h3 className="text-xl font-bold text-gray-800">מנהל/ת אזור</h3>
                        <p className="text-sm text-gray-500 mt-1">חברת אבטחה • תל אביב</p>
                      </div>
                      <span className="bg-emerald-100 text-emerald-800 text-xs px-2 py-1 rounded-full font-medium border border-emerald-200">
                        פעילה
                      </span>
                    </div>
                    
                    <div className="space-y-3 mb-6">
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-gray-600 flex items-center gap-2">
                          <i className="fas fa-users"></i> מועמדים חדשים:
                        </span>
                        <span className="font-bold text-gray-800">0</span>
                      </div>
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-gray-600 flex items-center gap-2">
                          <i className="fas fa-money-bill-wave"></i> שכר ותנאים:
                        </span>
                        <span className="font-bold text-gray-800">10,000 ₪ + רכב</span>
                      </div>
                    </div>

                    <button 
                      onClick={() => navigate('jobCandidates')}
                      className="w-full border border-emerald-800 text-emerald-800 hover:bg-emerald-50 py-2 rounded-lg font-medium transition-colors"
                    >
                      כניסה למשרה
                    </button>
                  </div>
                </div>

                {/* כרטיס משרה 3 - בק אופיס נכסים */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
                  <div className="h-2 bg-emerald-800 w-full"></div>
                  <div className="p-5">
                    <div className="flex justify-between items-start mb-4">
                      <div>
                        <h3 className="text-xl font-bold text-gray-800">בק אופיס</h3>
                        <p className="text-sm text-gray-500 mt-1">ניהול נכסים • רמת גן</p>
                      </div>
                      <span className="bg-emerald-100 text-emerald-800 text-xs px-2 py-1 rounded-full font-medium border border-emerald-200">
                        פעילה
                      </span>
                    </div>
                    
                    <div className="space-y-3 mb-6">
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-gray-600 flex items-center gap-2">
                          <i className="fas fa-users"></i> מועמדים חדשים:
                        </span>
                        <span className="font-bold text-gray-800">0</span>
                      </div>
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-gray-600 flex items-center gap-2">
                          <i className="fas fa-money-bill-wave"></i> שכר מוצע:
                        </span>
                        <span className="font-bold text-gray-800">9,000 ₪</span>
                      </div>
                    </div>

                    <button 
                      onClick={() => navigate('jobCandidates')}
                      className="w-full border border-emerald-800 text-emerald-800 hover:bg-emerald-50 py-2 rounded-lg font-medium transition-colors"

                    </button>
                  </div>
                </div>

                  <div className="p-5">
                    <div className="flex justify-between items-start mb-4">
                      <div>

                        <p className="text-sm text-gray-500 mt-1">ארגון שירות</p>
                      </div>
                      <span className="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-full font-medium border border-gray-200">
                        מוקפאת
                      </span>
                    </div>
                    
                    <div className="space-y-3 mb-6">
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-gray-600 flex items-center gap-2">
                          <i className="fas fa-users"></i> מועמדים חדשים:
                        </span>
                        <span className="font-bold text-gray-800">0</span>

                      <div className="flex items-center justify-between text-sm">
                        <span className="text-gray-600 flex items-center gap-2">

                    </button>

          // --- מסך 2: הקמת משרה ---
          const renderCreateJob = () => (
            <div className="max-w-2xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-sm border border-gray-200">
              <button onClick={() => navigate('dashboard')} className="text-gray-500 hover:text-emerald-800 flex items-center gap-2 mb-6 text-sm">
                <i className="fas fa-arrow-right"></i> חזרה לדשבורד
              </button>
              
              <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-3">
                <i className="fas fa-briefcase text-emerald-700"></i>
                הקמת משרה חדשה
              </h2>

              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">שם המשרה</label>

                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">תיאור הארגון ותנאים</label>
                  <textarea rows="2" defaultValue="חברת אבטחה, תל אביב. 10,000 ש״ח + רכב צמוד. משרה מלאה 07:00-16:00." className="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none"></textarea>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">דרישות חובה</label>
                    <textarea rows="3" defaultValue="ניסיון מוכח בניהול בחברת אבטחה, רישיון רכב, רישיון נשק ארגוני, זמינות 24/7 (כוננות)." className="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none"></textarea>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">דרישות יתרון</label>
                    <textarea rows="3" defaultValue="יוצאי יחידות קרביות, ניסיון בניהול מערכי אבטחה גדולים." className="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none"></textarea>
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">שאלות קבועות למועמד שישולבו בשאלון</label>
                  <textarea rows="3" defaultValue="תאר אירוע שבו הוקפצת באמצע הלילה וכיצד טיפלת בו." className="w-full border border-gray-300 rounded-lg p-2.5 outline-none"></textarea>
                </div>
                
                <div className="pt-4 border-t mt-6 flex justify-end gap-3">
                  <button 
                    onClick={() => navigate('candidateForm')}
                    className="bg-emerald-800 hover:bg-emerald-900 text-white px-6 py-2.5 rounded-lg font-medium transition-colors flex items-center gap-2"

                    צור לינק למועמד ודמה כניסה <i className="fas fa-arrow-left"></i>

                </div>
              </div>
            </div>

          const renderCandidateForm = () => (
            <div className="max-w-2xl mx-auto mt-8 p-6 bg-slate-50 rounded-xl shadow-sm border border-slate-200">
              <div className="text-center mb-8">
                <h2 className="text-2xl font-bold text-slate-800 mb-2">המשך תהליך מועמדות</h2>
                <p className="text-slate-600 max-w-md mx-auto text-sm">
                  עברת סינון קורות חיים ראשוני. כדי להמשיך בתהליך, נבקש ממך להעלות מחדש קורות חיים ולענות על מספר שאלות קצרות.
                </p>
              </div>

              <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-100 space-y-4">
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">שם מלא</label>
                    <input type="text" defaultValue="דניאל כהן" className="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">טלפון</label>
                    <input type="text" defaultValue="050-1234567" className="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50" />
                  </div>
                </div>

                <div className="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center bg-gray-50">
                  <i className="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3 block"></i>
                  <p className="text-sm text-gray-600 font-medium">העלאת קורות חיים מעודכנים</p>
                  <p className="text-xs text-gray-400 mt-1">CV_Daniel_Cohen.pdf (הועלה בהצלחה)</p>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">זמינות לתחילת עבודה</label>
                  <input type="text" defaultValue="מיידית" className="w-full border border-gray-300 rounded-lg p-2.5" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">למה התפקיד מעניין אותך?</label>
                  <textarea rows="2" defaultValue="מעוניין להשתלב ולצמוח בארגון, מתחבר לעבודה מול אנשים ואחריות." className="w-full border border-gray-300 rounded-lg p-2.5 text-sm"></textarea>
                </div>

                <button 
                  onClick={() => {
                    setCandidateCompleted(true);
                    navigate('thankYou');
                  }}
                  className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold text-lg mt-4 transition-colors"
                >
                  שליחת שאלון
                </button>
              </div>
            </div>
          );

          // --- מסך 4: תודה למועמד ---
          const renderThankYou = () => (
            <div className="max-w-md mx-auto mt-20 p-8 bg-white rounded-xl shadow-lg border border-gray-100 text-center">
              <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i className="fas fa-check-circle text-5xl text-green-600"></i>
              </div>
              <h2 className="text-2xl font-bold text-gray-800 mb-3">תודה רבה על הזמן שלך!</h2>
              <p className="text-gray-600 mb-8 leading-relaxed">
                הפרטים והשאלון הועברו בהצלחה לרכז הגיוס.<br/>
                במידה ותימצא התאמה להמשך התהליך, ניצור איתך קשר.
              </p>
              
              <div className="border-t pt-6 mt-6">
                <button 
                  onClick={() => navigate('dashboard')}
                  className="text-emerald-800 bg-emerald-50 hover:bg-emerald-100 px-6 py-2 rounded-lg font-medium transition-colors text-sm"
                >
                  חזרה למסך מגייס
                </button>
              </div>
            </div>
          );

                <i className="fas fa-arrow-right"></i> חזרה לדשבורד
              </button>

              <div className="flex justify-between items-center mb-6">
                <div>
                  <h2 className="text-2xl font-bold text-gray-800">ניהול מועמדים למשרה</h2>

              </div>

              {/* תצוגת פרטי המשרה */}

                  onClick={() => setShowJobDetails(!showJobDetails)}
                  className="w-full px-6 py-4 flex justify-between items-center hover:bg-gray-50 transition-colors"
                >
                  <div className="flex items-center gap-3 font-bold text-gray-700">
                    <i className="fas fa-briefcase text-emerald-600"></i>
                    פרטי המשרה (דרישות והגדרות)
                  </div>
                  <i className={`fas fa-chevron-down text-gray-500 transition-transform ${showJobDetails ? 'rotate-180' : ''}`}></i>
                </button>
                
                {showJobDetails && (
                  <div className="px-6 pb-6 pt-2 border-t border-gray-100 bg-gray-50/50">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                      <div>

              </div>

                  <div>
                    <h4 className="font-bold text-emerald-900">התראה: מועמד חדש השלים שאלון</h4>
                    <p className="text-sm text-emerald-800 mt-1">המערכת מוכנה להפיק פתקית ראיון טלפוני עבור דניאל כהן.</p>
                  </div>
                </div>
              )}

              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table className="w-full text-right">
                  <thead className="bg-gray-50 border-b border-gray-200">
                    <tr>
                      <th className="py-3 px-4 font-medium text-gray-600">שם מועמד</th>

                      <th className="py-3 px-4 font-medium text-gray-600">קורות חיים</th>
                      <th className="py-3 px-4 font-medium text-gray-600">פעולה</th>

                  <tbody>

                        <td className="py-4 px-4 font-bold text-gray-800">דניאל כהן</td>
                        <td className="py-4 px-4">
                          <span className="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full font-medium">
                            השלים שאלון
                          </span>
                        </td>
                        <td className="py-4 px-4 text-gray-600 text-sm flex items-center gap-2">
                          <i className="fas fa-file-alt text-emerald-600"></i> התקבלו
                        </td>
                        <td className="py-4 px-4">
                          <button 
                            onClick={() => navigate('stickyNote')}
                            className="bg-emerald-800 hover:bg-emerald-900 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm"
                          >
                            <i className="fas fa-magic"></i>
                            הפק פתקית ראיון

                      </tr>

                      <tr>
                        <td colSpan="4" className="py-8 text-center text-gray-500">

                      </tr>
